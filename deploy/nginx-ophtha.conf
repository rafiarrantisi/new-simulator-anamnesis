# OphthaSim — nginx site (HTTP). `certbot --nginx` akan menambah blok 443
# + redirect HTTPS otomatis. __DOMAIN__ & __DIST__ diisi oleh setup.sh.
#
# Satu domain: nginx melayani frontend statis (/) + proxy backend
# (/api, /health) → uvicorn 127.0.0.1:8000. Same-origin → tanpa CORS.

server {
    listen 80;
    listen [::]:80;
    server_name __DOMAIN__;

    # Frontend build statis (sistemnya/dist)
    root __DIST__;
    index index.html;

    # SPA: app satu halaman (state di klien) → selalu sajikan index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Backend API + health → uvicorn
    location ~ ^/(api|health) {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # WebSocket (opsional, /api/sessions/{id}/ws)
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        # PENTING: LLM (turn + /scoring/evaluate) bisa 25–75 dtk →
        # timeout default nginx 60s akan memotong. Naikkan.
        proxy_connect_timeout 15s;
        proxy_send_timeout    180s;
        proxy_read_timeout    180s;
    }

    # Audio STT (voice) bisa besar
    client_max_body_size 25m;
}
