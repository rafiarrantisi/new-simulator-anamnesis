# OphthaSim — map utk WebSocket upgrade (Tier A v0.13.0).
# Wajib di /etc/nginx/conf.d/ (level http), di-deploy oleh setup.sh.
# $connection_upgrade dipakai di server block (`proxy_set_header Connection
# $connection_upgrade;`) supaya WS handshake lolos & koneksi non-WS tidak
# dikirim header Upgrade kosong.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}
